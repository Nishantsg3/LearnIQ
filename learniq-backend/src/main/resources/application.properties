spring.application.name=learniq-backend
server.port=${PORT:8080}
server.address=0.0.0.0

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# COMMON SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# SECURITY
app.jwt.secret=${APP_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# SEEDING
app.seed.admin.email=${APP_SEED_ADMIN_EMAIL:admin@learniq.com}
app.seed.admin.password=${APP_SEED_ADMIN_PASSWORD:admin@123}
app.seed.admin.name=${APP_SEED_ADMIN_NAME:Admin}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# SMTP CONFIGURATION (BREVO)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME:none}
spring.mail.password=${MAIL_PASSWORD:none}
spring.mail.from=${MAIL_FROM:learniq.main@gmail.com}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
