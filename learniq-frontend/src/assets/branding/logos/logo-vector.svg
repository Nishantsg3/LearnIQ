<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qGlow" x1="120" y1="40" x2="320" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C084FC"/>
      <stop offset="0.5" stop-color="#9333EA"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>

    <linearGradient id="textIQ" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C084FC"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Energy Q -->
  <g transform="translate(60,40)">
    <!-- Outer ring -->
    <circle
      cx="140"
      cy="140"
      r="90"
      stroke="url(#qGlow)"
      stroke-width="16"
      fill="none"
      stroke-linecap="round"
      filter="url(#glow)"
    />

    <!-- Inner ring -->
    <circle
      cx="140"
      cy="140"
      r="72"
      stroke="#A855F7"
      stroke-opacity="0.55"
      stroke-width="6"
      fill="none"
    />

    <!-- Q tail -->
    <path
      d="M190 190 L255 255"
      stroke="url(#qGlow)"
      stroke-width="22"
      stroke-linecap="round"
      filter="url(#glow)"
    />

    <!-- Glow spark -->
    <circle cx="218" cy="63" r="7" fill="#F5F3FF"/>
    <circle cx="218" cy="63" r="16" fill="#C084FC" fill-opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(380,145)">
    <text
      x="0"
      y="0"
      fill="white"
      font-family="Montserrat, Inter, Arial, sans-serif"
      font-size="86"
      font-weight="700"
      letter-spacing="16"
    >
      LEARN
    </text>

    <text
      x="505"
      y="0"
      fill="url(#textIQ)"
      font-family="Montserrat, Inter, Arial, sans-serif"
      font-size="86"
      font-weight="700"
      letter-spacing="10"
    >
      IQ
    </text>

    <text
      x="4"
      y="70"
      fill="#A78BFA"
      fill-opacity="0.75"
      font-family="Inter, Arial, sans-serif"
      font-size="24"
      font-weight="500"
      letter-spacing="10"
    >
      ASSESS • ANALYZE • ADVANCE
    </text>
  </g>
</svg>